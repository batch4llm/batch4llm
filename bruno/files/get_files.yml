info:
  name: get_files
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/files"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          var body = res.getBody();
          if (Array.isArray(body) && body.length > 0) {
            var ids = body.map(function(file) { return file.id; });
            bru.setVar("uploaded_file_ids", JSON.stringify(ids));
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

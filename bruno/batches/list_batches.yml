info:
  name: list_batches
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/batches"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          var body = res.getBody();
          if (body.length > 0) {
            var newId = body[0].id;
            bru.setVar("batch_id", newId);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

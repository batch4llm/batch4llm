services:
  backend:
    build:
      context: ./backend
      target: dev
    command: uvicorn batch4llm.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/src:/app/src
    environment:
      - SECURE_COOKIES=false

  worker:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend/src:/app/src

  beat:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    environment:
      - VITE_API_TARGET=http://traefik:80
    labels:
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
